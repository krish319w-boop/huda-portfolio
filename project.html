<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>تفاصيل المشروع</title><link rel="stylesheet" href="style.css"></head><body>
<header><div class="logo">هدى حسين</div><nav><a href="index.html">الرئيسية</a><a href="projects.html">المشاريع</a><a href="contact.html">تواصل</a></nav><a class="btn" href="contact.html">تواصل</a></header>
<section><h1 class="section-title" id="title">جاري التحميل...</h1><p class="section-desc" id="desc"></p><div class="details" id="details"></div><br><div class="gallery" id="gallery"></div></section>
<div class="lightbox" id="lightbox"><button class="lb-btn lb-close" onclick="closeLb()">إغلاق ✕</button><button class="lb-btn lb-zoom" onclick="zoom()">تكبير</button><button class="lb-btn lb-prev" onclick="prev()">›</button><img id="lbImg" onclick="zoom()"><button class="lb-btn lb-next" onclick="next()">‹</button></div>
<footer>© 2026 هدى حسين</footer>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="firebase.js"></script><script>
const id=new URLSearchParams(location.search).get("id");let images=[],idx=0;function fallback(){return "https://images.unsplash.com/photo-1618220179428-22790b461013?q=80&w=1200&auto=format&fit=crop"}function list(p){return Array.isArray(p.images)&&p.images.length?p.images:[p.imageUrl].filter(Boolean)}
db.collection("projects").doc(id).get().then(doc=>{if(!doc.exists){title.textContent="المشروع غير موجود";return}const p=doc.data();images=list(p);title.textContent=p.title||"";desc.textContent=p.description||"";details.innerHTML=`الموقع: ${p.projectLocation||"-"} | السنة: ${p.year||"-"} | المساحة: ${p.area||"-"} | التصنيف: ${p.category||"-"}`;gallery.innerHTML=images.map((src,i)=>`<img src="${src}" onclick="openLb(${i})" onerror="this.src='${fallback()}'">`).join("")})
function openLb(i){idx=i;lightbox.classList.add("active");show()}function closeLb(){lightbox.classList.remove("active");lbImg.classList.remove("zoomed")}function show(){lbImg.classList.remove("zoomed");lbImg.src=images[idx]||fallback()}function next(){idx=(idx+1)%images.length;show()}function prev(){idx=(idx-1+images.length)%images.length;show()}function zoom(){lbImg.classList.toggle("zoomed")}
document.addEventListener("keydown",e=>{if(!lightbox.classList.contains("active"))return;if(e.key==="Escape")closeLb();if(e.key==="ArrowLeft")next();if(e.key==="ArrowRight")prev();if(e.key==="Enter")zoom()})
</script></body></html>
