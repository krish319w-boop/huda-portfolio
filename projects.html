<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>المشاريع | هدى حسين</title><link rel="stylesheet" href="style.css"></head><body>
<header><div class="logo">هدى حسين</div><nav><a href="index.html">الرئيسية</a><a href="projects.html">المشاريع</a><a href="contact.html">تواصل</a><a href="admin.html">Admin</a></nav><a class="btn" href="contact.html">تواصل</a></header>
<section><h1 class="section-title">كل المشاريع</h1><p class="section-desc">اختاري المشروع لمشاهدة الصور والتفاصيل كاملة.</p><div class="projects" id="projectsGrid"><div class="empty">جاري تحميل المشاريع...</div></div></section>
<footer>© 2026 هدى حسين</footer>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="firebase.js"></script><script>
const grid=document.getElementById("projectsGrid");function f(){return "https://images.unsplash.com/photo-1618220179428-22790b461013?q=80&w=1200&auto=format&fit=crop"}function imgs(p){return Array.isArray(p.images)&&p.images.length?p.images:[p.imageUrl].filter(Boolean)}function card(p,id){let im=imgs(p)[0]||f();return `<article class="project"><img src="${im}" onerror="this.src='${f()}'"><div class="project-content"><div class="tag">${p.category||"مشروع"}</div><h3>${p.title||""}</h3><p>${p.description||""}</p><div class="details"><div>الموقع: ${p.projectLocation||"-"}</div><div>السنة: ${p.year||"-"}</div><div>المساحة: ${p.area||"-"}</div><div>عدد الصور: ${imgs(p).length}</div></div><br><a class="btn" href="project.html?id=${id}">عرض المشروع</a></div></article>`}
db.collection("projects").orderBy("createdAt","desc").onSnapshot(s=>{grid.innerHTML="";if(s.empty){grid.innerHTML='<div class="empty">لسه مفيش مشاريع.</div>';return}s.forEach(d=>grid.innerHTML+=card(d.data(),d.id))},e=>grid.innerHTML='<div class="error">مشكلة في تحميل المشاريع.</div>')
</script></body></html>
