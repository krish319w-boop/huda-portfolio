<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | هدى حسين</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#f7f2ec;color:#2d241f}a{text-decoration:none;color:#6d3f22}.wrap{max-width:1100px;margin:auto;padding:35px 18px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:20px}.card{background:white;border-radius:28px;padding:25px;box-shadow:0 8px 24px #0001;margin-bottom:22px}h1,h2{margin-top:0}input,textarea,select{width:100%;padding:14px;margin:8px 0 15px;border:1px solid #ddd;border-radius:14px;font-family:inherit}textarea{min-height:100px}.btn{background:#9a6a45;color:white;border:0;padding:13px 22px;border-radius:999px;cursor:pointer}.danger{background:#b83232}.muted{color:#6d5c52;line-height:1.8}.hidden{display:none}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.project{background:#fff;border:1px solid #eee;border-radius:22px;overflow:hidden}.project img{width:100%;height:190px;object-fit:cover;background:#eee}.project div{padding:15px}.msg{padding:12px;border-radius:14px;background:#f3e8dd;margin:10px 0;display:none}.error{background:#ffe4e4;color:#9b1c1c}.ok{background:#e7f7e7;color:#1c6b1c}@media(max-width:900px){.grid{grid-template-columns:1fr}.top{display:block}}
</style>
</head>
<body>
<div class="wrap"><div class="top"><h1>لوحة التحكم</h1><a href="index.html">العودة للموقع</a></div><div id="message" class="msg"></div>
<div class="card" id="loginBox"><h2>تسجيل الدخول</h2><p class="muted">ادخلي بإيميل وباسورد Firebase. استخدمي زر إنشاء حساب أول مرة فقط.</p><input id="email" type="email" placeholder="الإيميل"><input id="password" type="password" placeholder="الباسورد"><button class="btn" onclick="login()">دخول</button> <button class="btn" onclick="signup()">إنشاء حساب</button></div>
<div id="adminBox" class="hidden"><div class="card"><div class="top"><h2>إضافة مشروع جديد</h2><button class="btn danger" onclick="logout()">خروج</button></div>
<input id="title" placeholder="اسم المشروع مثال: شقة مودرن - التجمع"><select id="category"><option>شقة مودرن</option><option>شقة كلاسيك</option><option>مشروع تجاري</option><option>فيلا</option><option>مطبخ</option></select><textarea id="description" placeholder="وصف المشروع"></textarea><input id="imageUrl" placeholder="رابط الصورة المباشر مثال: https://i.postimg.cc/.../image.jpg"><input id="projectLocation" placeholder="الموقع مثال: القاهرة"><input id="year" placeholder="السنة مثال: 2026"><input id="area" placeholder="المساحة مثال: 180 م²"><button class="btn" onclick="addProject()">إضافة المشروع</button><p class="muted">مهم: رابط الصورة لازم يكون مباشر. من Postimages اختاري Direct link.</p></div><div class="card"><h2>المشاريع الحالية</h2><div class="grid" id="adminProjects"></div></div></div></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="firebase.js"></script>
<script>
const messageBox=document.getElementById("message");function showMessage(t,type="ok"){messageBox.textContent=t;messageBox.className="msg "+type;messageBox.style.display="block";setTimeout(()=>messageBox.style.display="none",5000)}function val(id){return document.getElementById(id).value.trim()}
function login(){auth.signInWithEmailAndPassword(val("email"),val("password")).then(()=>showMessage("تم تسجيل الدخول")).catch(e=>showMessage(e.message,"error"))}
function signup(){auth.createUserWithEmailAndPassword(val("email"),val("password")).then(()=>showMessage("تم إنشاء الحساب وتسجيل الدخول")).catch(e=>showMessage(e.message,"error"))}
function logout(){auth.signOut()}
auth.onAuthStateChanged(user=>{document.getElementById("loginBox").classList.toggle("hidden",!!user);document.getElementById("adminBox").classList.toggle("hidden",!user);if(user)loadProjects()});
async function addProject(){const project={title:val("title"),category:val("category"),description:val("description"),imageUrl:val("imageUrl"),projectLocation:val("projectLocation"),year:val("year"),area:val("area"),createdAt:firebase.firestore.FieldValue.serverTimestamp()};if(!project.title||!project.description||!project.imageUrl){showMessage("اكتبي اسم المشروع والوصف ورابط الصورة","error");return}try{await db.collection("projects").add(project);showMessage("تم إضافة المشروع بنجاح");["title","description","imageUrl","projectLocation","year","area"].forEach(id=>document.getElementById(id).value="")}catch(e){console.error(e);showMessage("لم يتم إضافة المشروع. تأكدي من Firestore Rules وأنك مسجلة دخول.","error")}}
function loadProjects(){db.collection("projects").orderBy("createdAt","desc").onSnapshot(s=>{const box=document.getElementById("adminProjects");box.innerHTML="";if(s.empty){box.innerHTML="<p class='muted'>لا توجد مشاريع حتى الآن.</p>";return}s.forEach(d=>{const p=d.data();const img=p.imageUrl||"https://images.unsplash.com/photo-1618220179428-22790b461013?q=80&w=1200&auto=format&fit=crop";box.innerHTML+=`<div class="project"><img src="${img}" onerror="this.src='https://images.unsplash.com/photo-1618220179428-22790b461013?q=80&w=1200&auto=format&fit=crop'"><div><h3>${p.title||""}</h3><p>${p.category||""}</p><button class="btn danger" onclick="deleteProject('${d.id}')">حذف</button></div></div>`})},e=>{console.error(e);showMessage("مشكلة في تحميل المشاريع. تأكدي من Firestore Rules.","error")})}
function deleteProject(id){if(confirm("هل تريدين حذف المشروع؟"))db.collection("projects").doc(id).delete().then(()=>showMessage("تم حذف المشروع")).catch(e=>showMessage(e.message,"error"))}
</script>
</body>
</html>
