<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>لوحة التحكم</title><link rel="stylesheet" href="style.css"></head><body>
<header><div class="logo">Admin</div><nav><a href="index.html">الموقع</a><a href="projects.html">المشاريع</a></nav></header><section><div id="message" class="msg"></div>
<div class="admin-card" id="loginBox"><h2>تسجيل الدخول</h2><input id="email" type="email" placeholder="الإيميل"><input id="password" type="password" placeholder="الباسورد"><button class="btn" onclick="login()">دخول</button> <button class="btn light" onclick="signup()">إنشاء حساب</button></div>
<div id="adminBox" style="display:none"><div class="admin-card"><h2 id="formTitle">إضافة مشروع</h2><input type="hidden" id="editId"><input id="title" placeholder="اسم المشروع"><select id="category"><option>شقة مودرن</option><option>شقة كلاسيك</option><option>مشروع تجاري</option><option>فيلا</option><option>مطبخ</option></select><textarea id="description" placeholder="وصف المشروع"></textarea><textarea id="images" placeholder="روابط الصور - كل رابط في سطر"></textarea><input id="projectLocation" placeholder="الموقع"><input id="year" placeholder="السنة"><input id="area" placeholder="المساحة"><button class="btn" onclick="saveProject()">حفظ</button> <button class="btn light" onclick="resetForm()">إلغاء التعديل</button> <button class="btn red" onclick="logout()">خروج</button></div><h2>المشاريع الحالية</h2><div class="admin-grid" id="adminProjects"></div></div></section>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script><script src="firebase.js"></script><script>
function v(id){return document.getElementById(id).value.trim()}function show(t,b=false){message.textContent=t;message.className="msg "+(b?"bad":"ok");message.style.display="block"}function login(){auth.signInWithEmailAndPassword(v("email"),v("password")).catch(e=>show(e.message,true))}function signup(){auth.createUserWithEmailAndPassword(v("email"),v("password")).then(()=>show("تم إنشاء الحساب")).catch(e=>show(e.message,true))}function logout(){auth.signOut()}
auth.onAuthStateChanged(u=>{loginBox.style.display=u?"none":"block";adminBox.style.display=u?"block":"none";if(u)loadProjects()})
function parseImages(){return v("images").split("\n").map(x=>x.trim()).filter(Boolean)}function data(){let im=parseImages();return{title:v("title"),category:v("category"),description:v("description"),images:im,imageUrl:im[0]||"",projectLocation:v("projectLocation"),year:v("year"),area:v("area"),updatedAt:firebase.firestore.FieldValue.serverTimestamp()}}
async function saveProject(){let d=data();if(!d.title||!d.description||!d.images.length){show("اكتب الاسم والوصف وصورة واحدة على الأقل",true);return}let id=v("editId");try{if(id){await db.collection("projects").doc(id).update(d);show("تم تعديل المشروع")}else{d.createdAt=firebase.firestore.FieldValue.serverTimestamp();await db.collection("projects").add(d);show("تم إضافة المشروع")}resetForm()}catch(e){console.error(e);show("مشكلة في الحفظ. راجع Firestore Rules.",true)}}
function resetForm(){["editId","title","description","images","projectLocation","year","area"].forEach(x=>document.getElementById(x).value="");formTitle.textContent="إضافة مشروع"}
function loadProjects(){db.collection("projects").orderBy("createdAt","desc").onSnapshot(s=>{adminProjects.innerHTML="";s.forEach(doc=>{let p=doc.data();let imgs=Array.isArray(p.images)?p.images:[];adminProjects.innerHTML+=`<div class="admin-project"><img src="${p.imageUrl||""}"><div><h3>${p.title||""}</h3><p>${p.category||""}</p><button class="btn light" onclick='editProject("${doc.id}")'>تعديل</button> <button class="btn red" onclick='deleteProject("${doc.id}")'>حذف</button></div></div>`})})}
async function editProject(id){let doc=await db.collection("projects").doc(id).get();let p=doc.data();editId.value=id;title.value=p.title||"";category.value=p.category||"شقة مودرن";description.value=p.description||"";images.value=(Array.isArray(p.images)?p.images:[p.imageUrl].filter(Boolean)).join("\n");projectLocation.value=p.projectLocation||"";year.value=p.year||"";area.value=p.area||"";formTitle.textContent="تعديل مشروع";scrollTo(0,0)}
function deleteProject(id){if(confirm("حذف المشروع؟"))db.collection("projects").doc(id).delete().then(()=>show("تم الحذف"))}
</script></body></html>
