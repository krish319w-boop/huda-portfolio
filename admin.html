<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | هدى حسين</title>
<style>
*{box-sizing:border-box}body{margin:0;font-family:Tahoma,Arial,sans-serif;background:#f7f2ec;color:#2d241f}.wrap{max-width:1100px;margin:auto;padding:35px 18px}.card{background:white;border-radius:28px;padding:25px;box-shadow:0 8px 24px #0001;margin-bottom:22px}
input,textarea,select{width:100%;padding:14px;margin:8px 0 15px;border:1px solid #ddd;border-radius:14px;font-family:inherit}textarea{min-height:100px}.btn{background:#9a6a45;color:white;border:0;padding:13px 22px;border-radius:999px;cursor:pointer}.danger{background:#b83232}.muted{color:#6d5c52}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.project{background:#fff;border:1px solid #eee;border-radius:22px;overflow:hidden}.project img{width:100%;height:190px;object-fit:cover}.project div{padding:15px}.top{display:flex;justify-content:space-between;gap:10px;align-items:center}.hidden{display:none}@media(max-width:900px){.grid{grid-template-columns:1fr}.top{display:block}}
</style>
</head>
<body>
<div class="wrap">
<div class="top"><h1>لوحة التحكم</h1><a href="index.html">العودة للموقع</a></div>
<div class="card" id="loginBox"><h2>تسجيل الدخول</h2><p class="muted">ادخلي بإيميل وباسورد Firebase.</p><input id="email" type="email" placeholder="الإيميل"><input id="password" type="password" placeholder="الباسورد"><button class="btn" onclick="login()">دخول</button> <button class="btn" onclick="signup()">إنشاء مستخدم أول مرة</button></div>
<div id="adminBox" class="hidden">
<div class="card"><div class="top"><h2>إضافة مشروع جديد</h2><button class="btn danger" onclick="logout()">خروج</button></div>
<input id="title" placeholder="اسم المشروع مثال: شقة مودرن - التجمع">
<select id="category"><option>شقة مودرن</option><option>شقة كلاسيك</option><option>مشروع تجاري</option><option>فيلا</option><option>مطبخ</option></select>
<textarea id="description" placeholder="وصف المشروع"></textarea>
<input id="imageUrl" placeholder="رابط الصورة من imgbb أو postimages">
<input id="location" placeholder="الموقع مثال: القاهرة"><input id="year" placeholder="السنة مثال: 2026"><input id="area" placeholder="المساحة مثال: 180 م²">
<button class="btn" onclick="addProject()">إضافة المشروع</button></div>
<div class="card"><h2>المشاريع الحالية</h2><div class="grid" id="adminProjects"></div></div>
</div></div>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firebase.js"></script>
<script>
function login(){auth.signInWithEmailAndPassword(email.value,password.value).catch(e=>alert(e.message));}
function signup(){auth.createUserWithEmailAndPassword(email.value,password.value).then(()=>alert("تم إنشاء المستخدم")).catch(e=>alert(e.message));}
function logout(){auth.signOut();}
auth.onAuthStateChanged(user=>{loginBox.classList.toggle("hidden",!!user);adminBox.classList.toggle("hidden",!user);if(user)loadProjects();});
async function addProject(){
 const project={title:title.value,category:category.value,description:description.value,imageUrl:imageUrl.value,location:location.value,year:year.value,area:area.value,createdAt:firebase.firestore.FieldValue.serverTimestamp()};
 if(!project.title||!project.description||!project.imageUrl){alert("اكتبي اسم المشروع والوصف ورابط الصورة");return;}
 await db.collection("projects").add(project);alert("تم إضافة المشروع");
 title.value=description.value=imageUrl.value=location.value=year.value=area.value="";
}
function loadProjects(){
 db.collection("projects").orderBy("createdAt","desc").onSnapshot(snapshot=>{
  adminProjects.innerHTML="";
  snapshot.forEach(doc=>{const p=doc.data();adminProjects.innerHTML+=`<div class="project"><img src="${p.imageUrl}"><div><h3>${p.title}</h3><p>${p.category}</p><button class="btn danger" onclick="deleteProject('${doc.id}')">حذف</button></div></div>`;});
 });
}
function deleteProject(id){if(confirm("حذف المشروع؟"))db.collection("projects").doc(id).delete();}
</script>
</body>
</html>
