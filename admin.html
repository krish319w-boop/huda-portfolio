<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
body{font-family:Tahoma;background:#f7f2ec;margin:0;padding:20px}
.container{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:20px}
input,textarea,select{width:100%;padding:10px;margin:10px 0;border-radius:10px;border:1px solid #ccc}
button{padding:10px 20px;background:#8b5e3c;color:#fff;border:none;border-radius:20px;cursor:pointer}
.project{background:#fff;border:1px solid #ddd;margin-top:10px;padding:10px;border-radius:10px}
img{width:100%;height:200px;object-fit:cover}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

</head>

<body>

<div class="container">

<h2>تسجيل الدخول</h2>

<input id="email" placeholder="الإيميل">
<input id="password" type="password" placeholder="الباسورد">

<button onclick="login()">دخول</button>
<button onclick="signup()">إنشاء حساب</button>

<hr>

<h2>إضافة مشروع</h2>

<input id="title" placeholder="اسم المشروع">
<select id="category">
<option>شقة مودرن</option>
<option>شقة كلاسيك</option>
<option>مشروع تجاري</option>
</select>

<textarea id="description" placeholder="الوصف"></textarea>
<input id="imageUrl" placeholder="رابط الصورة">
<input id="projectLocation" placeholder="الموقع">
<input id="year" placeholder="السنة">
<input id="area" placeholder="المساحة">

<button onclick="addProject()">إضافة المشروع</button>

<h2>المشاريع</h2>
<div id="projects"></div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyCTUb72QTPGr2yzrJCFgJNBWSI2D9gt_Q8",
  authDomain: "hoda-portflio.firebaseapp.com",
  projectId: "hoda-portflio",
  storageBucket: "hoda-portflio.firebasestorage.app",
  messagingSenderId: "881971239680",
  appId: "1:881971239680:web:770569ab484b92977a31e5"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

function login(){
  auth.signInWithEmailAndPassword(email.value, password.value)
  .catch(e => alert(e.message));
}

function signup(){
  auth.createUserWithEmailAndPassword(email.value, password.value)
  .then(()=> alert("تم إنشاء الحساب"))
  .catch(e => alert(e.message));
}

async function addProject(){

  const titleValue = document.getElementById("title").value;
  const categoryValue = document.getElementById("category").value;
  const descriptionValue = document.getElementById("description").value;
  const imageUrlValue = document.getElementById("imageUrl").value;
  const locationValue = document.getElementById("projectLocation").value;
  const yearValue = document.getElementById("year").value;
  const areaValue = document.getElementById("area").value;

  if(!titleValue || !descriptionValue || !imageUrlValue){
    alert("اكتبي البيانات الأساسية");
    return;
  }

  await db.collection("projects").add({
    title: titleValue,
    category: categoryValue,
    description: descriptionValue,
    imageUrl: imageUrlValue,
    location: locationValue || "",
    year: yearValue || "",
    area: areaValue || "",
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  alert("تم إضافة المشروع");

}

function loadProjects(){
  db.collection("projects").orderBy("createdAt","desc")
  .onSnapshot(snapshot => {

    projects.innerHTML = "";

    snapshot.forEach(doc => {

      const p = doc.data();

      projects.innerHTML += `
        <div class="project">
          <img src="${p.imageUrl}">
          <h3>${p.title}</h3>
          <p>${p.description}</p>
          <button onclick="deleteProject('${doc.id}')">حذف</button>
        </div>
      `;
    });

  });
}

function deleteProject(id){
  if(confirm("حذف المشروع؟")){
    db.collection("projects").doc(id).delete();
  }
}

auth.onAuthStateChanged(user=>{
  if(user){
    loadProjects();
  }
});

</script>

</body>
</html>
